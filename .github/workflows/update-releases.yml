name: Update latest releases

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build releases section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPOS=(navopw/leafblower navopw/graphmaid navopw/nicer-tab)
          : > /tmp/releases.md
          for repo in "${REPOS[@]}"; do
            if ! json=$(gh api "repos/${repo}/releases/latest" 2>/dev/null); then
              continue
            fi
            tag=$(echo "${json}" | jq -r '.tag_name')
            date=$(echo "${json}" | jq -r '.published_at | split("T")[0]')
            name=$(basename "${repo}")
            echo "- [${name} ${tag}](https://github.com/${repo}/releases/tag/${tag}) — ${date}" >> /tmp/releases.md
          done
          if [ ! -s /tmp/releases.md ]; then
            echo "_No public releases yet._" > /tmp/releases.md
          fi
          python3 <<'PY'
          from pathlib import Path
          import re
          block = Path("/tmp/releases.md").read_text().rstrip("\n")
          path = Path("README.md")
          text = path.read_text()
          pattern = re.compile(
              r"(<!-- releases:start -->\n)(.*?)(\n<!-- releases:end -->)",
              re.S,
          )
          new_text, n = pattern.subn(rf"\1{block}\3", text, count=1)
          if n != 1:
              raise SystemExit("releases markers not found in README.md")
          path.write_text(new_text)
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update latest releases"
          git push
